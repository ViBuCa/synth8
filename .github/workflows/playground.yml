name: Deploy Playground

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm test
      - run: pnpm --filter @vibuca/synth8-core build
      - run: pnpm --filter @vibuca/synth8-player build
      - run: pnpm --filter @vibuca/synth8-import-midi build
      - run: pnpm --filter @vibuca/playground build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/playground/dist

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/deploy-pages@v4